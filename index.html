<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contest Moods</title>
  <style>
    /* Scope everything under .cm-root so it won't leak into Webflow */
    .cm-root {
      --cm-bg: #0e0e10;
      --cm-fg: #f5f5f7;
      --cm-accent: #ff5b3a;
      --cm-muted: #8a8a93;
      --cm-radius: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px;
      background: var(--cm-bg);
      color: var(--cm-fg);
      box-sizing: border-box;
    }
    .cm-root *, .cm-root *::before, .cm-root *::after { box-sizing: border-box; }
    .cm-root h1 {
      font-size: clamp(28px, 4vw, 44px);
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .cm-root .cm-lead { color: var(--cm-muted); margin: 0 0 28px; }
    .cm-root .cm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }
    .cm-root .cm-mood {
      background: #1a1a1f;
      border: 1px solid #26262d;
      border-radius: var(--cm-radius);
      padding: 18px;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      user-select: none;
    }
    .cm-root .cm-mood:hover { transform: translateY(-2px); border-color: #3a3a44; }
    .cm-root .cm-mood.is-selected { border-color: var(--cm-accent); background: #211614; }
    .cm-root .cm-emoji { font-size: 28px; display: block; margin-bottom: 8px; }
    .cm-root .cm-label { font-weight: 600; }
    .cm-root .cm-result {
      margin-top: 24px;
      padding: 16px 18px;
      border-radius: var(--cm-radius);
      background: #1a1a1f;
      border: 1px solid #26262d;
      min-height: 24px;
      color: var(--cm-muted);
    }
    .cm-root .cm-result strong { color: var(--cm-fg); }
  </style>
</head>
<body>
  <section class="cm-root">
    <h1>Pick your contest mood</h1>
    <p class="cm-lead">Tap a mood to set the vibe.</p>
    <div class="cm-grid">
      <div class="cm-mood" data-mood="hyped"><span class="cm-emoji">🔥</span><span class="cm-label">Hyped</span></div>
      <div class="cm-mood" data-mood="chill"><span class="cm-emoji">🧊</span><span class="cm-label">Chill</span></div>
      <div class="cm-mood" data-mood="focused"><span class="cm-emoji">🎯</span><span class="cm-label">Focused</span></div>
      <div class="cm-mood" data-mood="playful"><span class="cm-emoji">🎈</span><span class="cm-label">Playful</span></div>
      <div class="cm-mood" data-mood="serious"><span class="cm-emoji">🧠</span><span class="cm-label">Serious</span></div>
      <div class="cm-mood" data-mood="weird"><span class="cm-emoji">👽</span><span class="cm-label">Weird</span></div>
    </div>
    <div class="cm-result">No mood selected yet.</div>
  </section>

  <script>
    (function () {
      // Find the most recently inserted .cm-root so this works both
      // standalone (GitHub Pages) and when injected into Webflow.
      var roots = document.querySelectorAll('.cm-root');
      var root = roots[roots.length - 1];
      if (!root) return;

      var grid = root.querySelector('.cm-grid');
      var result = root.querySelector('.cm-result');
      if (!grid || !result) return;

      grid.addEventListener('click', function (e) {
        var card = e.target.closest('.cm-mood');
        if (!card) return;

        grid.querySelectorAll('.cm-mood.is-selected').forEach(function (el) {
          el.classList.remove('is-selected');
        });
        card.classList.add('is-selected');

        var mood = card.getAttribute('data-mood');
        result.innerHTML = 'Mood set to <strong>' + mood + '</strong>.';

        window.dispatchEvent(new CustomEvent('contest-mood:change', { detail: { mood: mood } }));
      });
    })();
  </script>
</body>
</html>
