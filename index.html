<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contest Moods</title>
  <style>

    /* Scroll container — mirrors .pricing-caro-scroll-container.
       Breaks out of its parent to span the full viewport so cards can
       scroll off the right edge, while the first card lines up with the
       sibling .padding-global > .container-large column on the left. */
    .contest-moods__carousel {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      overflow: auto hidden;
      /* proximity, not mandatory: mandatory refuses to leave a card-aligned
         position, which makes the trailing ::after spacer unreachable and
         caps the scroll short of the true end. proximity snaps when *near*
         a card but lets the user reach scroll-end and see the 5vw gutter. */
      scroll-snap-type: x proximity;
      /* Snap target aligns with container-large left edge, not viewport edge */
      scroll-padding-left: max(5%, calc(50vw - 37rem));
      user-select: none;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      overscroll-behavior-x: contain;
      padding-bottom: 0.5rem;
    }

    /* Track inherits flex/gap from Webflow; we only add the gutter padding
       so the first/last cards line up with the container-large column.
         .padding-global → padding-left: 5%
         .container-large → max-width: 74rem
         → the inner column's left edge is at max(5%, calc(50vw - 37rem)) */
    .contest-moods__track {
      /* Leading edge aligns with container-large column so the first card
         lines up with the titles / controls above and below:
           .padding-global → 5% side padding
           .container-large → max-width: 74rem, centered
           → column left edge = max(5%, calc(50vw - 37rem))
         Trailing edge handled by scroll container's padding-right above. */
      padding-left: max(5%, calc(50vw - 37rem));
      padding-right: 0;
    }
    @media (hover: none) {
      .contest-moods__carousel { cursor: grab; }
      .contest-moods__carousel:active { cursor: grabbing; }
    }
    @media (hover: hover) {
      .contest-moods__carousel { cursor: default; }
    }
    .contest-moods__carousel.is-dragging { scroll-snap-type: none; }
    .contest-moods__carousel::-webkit-scrollbar { display: none; }
    .contest-moods__carousel { scrollbar-width: none; }
    /* Hold intrinsic width so cards overflow the track instead of shrinking
       to fit. Without this, Webflow's default flex-shrink: 1 makes 4 cards
       collapse to exactly fill the container — no scroll. */
    .moods-card {
      flex: 0 0 auto;
      scroll-snap-align: start;
    }

    /* Hover/tap reveal — fade in the three children that ship at opacity: 0
       (overlay tint, subhead text, and the minus icon). All three live
       inside .moods-card so a single hook covers them. The .is-active
       class is toggled via JS on tap so the reveal works on touch devices
       (where :hover is unreliable / sticky). */
    .moods-card .moods-card__overlay,
    .moods-card .mood-cards__fg-subhead,
    .moods-card .mood-cards__fg-icon--minus {
      transition: opacity 0.3s ease;
    }
    .moods-card:hover .moods-card__overlay,
    .moods-card.is-active .moods-card__overlay,
    .moods-card:hover .mood-cards__fg-subhead,
    .moods-card.is-active .mood-cards__fg-subhead,
    .moods-card:hover .mood-cards__fg-icon--minus,
    .moods-card.is-active .mood-cards__fg-icon--minus {
      opacity: 1;
    }

    /* Disabled state for prev/next links at the carousel's start/end */
    .contest-moods__controls__prev.is-disabled,
    .contest-moods__controls__next.is-disabled {
      opacity: 0.35;
      pointer-events: none;
      cursor: default;
    }

    /* Active state — prev gets a fill when the carousel has scrolled
       forward (there's content to go back to), next gets a fill when
       there's still content ahead (i.e. not at end). */
    .contest-moods__controls__prev,
    .contest-moods__controls__next {
      transition: background-color 0.2s ease, opacity 0.2s ease;
    }
    .contest-moods__controls__prev.is-active,
    .contest-moods__controls__next.is-active {
      background-color: rgba(49, 48, 47, 0.05);
    }


  </style>
</head>
<body>


  <script>
    (function () {
      // Initialize every .contest-moods__carousel on the page.
      function init(scroller) {
        if (!scroller || scroller.dataset.contestMoodsInit === '1') return;
        scroller.dataset.contestMoodsInit = '1';

        var track = scroller.querySelector('.contest-moods__track');
        var firstCard = scroller.querySelector('.moods-card');
        if (!track || !firstCard) return;

        // Prev/next controls live outside the scroller, in a sibling
        // .contest-moods__controls block. Find the nearest pair by walking
        // up to a common ancestor (or fall back to document-wide).
        var scope = scroller.closest('.contest-moods, section, main, body') || document;
        var prev = scope.querySelector('.contest-moods__controls__prev');
        var next = scope.querySelector('.contest-moods__controls__next');

        function step() {
          var gap = parseFloat(getComputedStyle(track).columnGap || getComputedStyle(track).gap) || 0;
          return firstCard.offsetWidth + gap;
        }

        function updateNav() {
          var max = scroller.scrollWidth - scroller.clientWidth;
          var atStart = scroller.scrollLeft <= 4;
          var atEnd = scroller.scrollLeft >= max - 4;
          if (prev) {
            prev.classList.toggle('is-disabled', atStart);
            prev.classList.toggle('is-active', !atStart);
            prev.setAttribute('aria-disabled', atStart ? 'true' : 'false');
          }
          if (next) {
            next.classList.toggle('is-disabled', atEnd);
            next.classList.toggle('is-active', !atEnd);
            next.setAttribute('aria-disabled', atEnd ? 'true' : 'false');
          }
        }

        function nudge(dir) {
          scroller.scrollBy({ left: dir * step(), behavior: 'smooth' });
        }

        if (prev) prev.addEventListener('click', function (e) {
          e.preventDefault();
          if (prev.classList.contains('is-disabled')) return;
          nudge(-1);
        });
        if (next) next.addEventListener('click', function (e) {
          e.preventDefault();
          if (next.classList.contains('is-disabled')) return;
          nudge(1);
        });

        var navRaf = 0;
        scroller.addEventListener('scroll', function () {
          if (navRaf) return;
          navRaf = requestAnimationFrame(function () {
            navRaf = 0;
            updateNav();
          });
        }, { passive: true });
        updateNav();

        // Drag-to-scroll (matches cursor: grab / grabbing in CSS)
        var isDown = false;
        var startX = 0;
        var startLeft = 0;
        var moved = false;

        scroller.addEventListener('pointerdown', function (e) {
          // Skip mouse — drag fights hover states on desktop.
          // Touch/pen only.
          if (e.pointerType === 'mouse') return;
          isDown = true;
          moved = false;
          startX = e.clientX;
          startLeft = scroller.scrollLeft;
          scroller.classList.add('is-dragging');
          try { scroller.setPointerCapture(e.pointerId); } catch (_) {}
        });

        scroller.addEventListener('pointermove', function (e) {
          if (!isDown) return;
          var dx = e.clientX - startX;
          if (Math.abs(dx) > 3) moved = true;
          if (moved) {
            e.preventDefault();
            scroller.scrollLeft = startLeft - dx;
          }
        });

        function endDrag() {
          if (!isDown) return;
          isDown = false;
          scroller.classList.remove('is-dragging');
        }
        scroller.addEventListener('pointerup', endDrag);
        scroller.addEventListener('pointercancel', endDrag);

        // Swallow click-through after a drag so cards don't navigate mid-swipe.
        // Otherwise, treat the click as a tap and toggle .is-active on the
        // tapped card so the hover-reveal styles fire on touch devices too.
        scroller.addEventListener('click', function (e) {
          if (moved) {
            e.preventDefault();
            e.stopPropagation();
            return;
          }
          var card = e.target.closest('.moods-card');
          if (!card || !scroller.contains(card)) return;
          var willActivate = !card.classList.contains('is-active');
          // Single-active: clear any other active siblings.
          scroller.querySelectorAll('.moods-card.is-active').forEach(function (el) {
            if (el !== card) el.classList.remove('is-active');
          });
          card.classList.toggle('is-active', willActivate);
        }, true);

        // Tapping outside any card clears the active state.
        document.addEventListener('click', function (e) {
          if (e.target.closest('.moods-card')) return;
          scroller.querySelectorAll('.moods-card.is-active').forEach(function (el) {
            el.classList.remove('is-active');
          });
        });
      }

      function initAll() {
        document.querySelectorAll('.contest-moods__carousel').forEach(init);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initAll);
      } else {
        initAll();
      }
    })();
  </script>
</body>
</html>
